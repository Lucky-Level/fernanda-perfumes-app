<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Rich gold gradient (lighter on top-left, deeper at edges) -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#F4E0A6"/>
      <stop offset="0.35" stop-color="#E5C98A"/>
      <stop offset="0.6"  stop-color="#C8A96B"/>
      <stop offset="1"    stop-color="#7E6230"/>
    </linearGradient>
    <linearGradient id="goldBright" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#FFE9B5"/>
      <stop offset="0.5" stop-color="#E5C98A"/>
      <stop offset="1"   stop-color="#9A7E48"/>
    </linearGradient>

    <!-- Background gradient · deep black with a hint of warm tone -->
    <radialGradient id="bg" cx="50%" cy="42%" r="80%">
      <stop offset="0"   stop-color="#1A130A"/>
      <stop offset="0.6" stop-color="#0B0905"/>
      <stop offset="1"   stop-color="#050302"/>
    </radialGradient>

    <!-- Arabesque tile pattern · subtle floral motifs -->
    <pattern id="arabesque" patternUnits="userSpaceOnUse" x="0" y="0" width="64" height="64" patternTransform="rotate(0)">
      <g fill="none" stroke="#3B2A18" stroke-width="0.9" opacity="0.85">
        <!-- 8-petal floral motif -->
        <g transform="translate(32 32)">
          <path d="M0 -22 C8 -14, 8 -8, 0 0 C-8 -8, -8 -14, 0 -22Z"/>
          <path d="M0 22  C8 14,  8 8,  0 0 C-8 8,  -8 14, 0 22Z"/>
          <path d="M-22 0 C-14 -8, -8 -8, 0 0 C-8 8,  -14 8,  -22 0Z"/>
          <path d="M22 0  C14 -8,  8 -8,  0 0 C8 8,   14 8,   22 0Z"/>
          <path d="M-16 -16 C-10 -10, -6 -6, 0 0 C-6 -6, -10 -10, -16 -16Z" transform="rotate(45)"/>
          <path d="M-16 -16 C-10 -10, -6 -6, 0 0 C-6 -6, -10 -10, -16 -16Z" transform="rotate(135)"/>
          <circle cx="0" cy="0" r="2.4" fill="#3B2A18" stroke="none"/>
        </g>
        <!-- Corner connectors -->
        <path d="M0 0 L8 8 M64 0 L56 8 M0 64 L8 56 M64 64 L56 56"/>
      </g>
    </pattern>

    <!-- Sparkle glyph -->
    <symbol id="sparkle" viewBox="-10 -10 20 20">
      <path d="M0 -8 L1.4 -1.4 L8 0 L1.4 1.4 L0 8 L-1.4 1.4 L-8 0 L-1.4 -1.4 Z" fill="#FFE9B5"/>
    </symbol>

    <!-- Soft inner glow for the gold strokes -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ========== Background tile ========== -->
  <rect x="20" y="20" width="472" height="472" rx="96" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="96" fill="url(#arabesque)" opacity="0.9"/>

  <!-- Outer gold frame · double line -->
  <rect x="22" y="22" width="468" height="468" rx="94" fill="none" stroke="url(#gold)" stroke-width="3.5"/>
  <rect x="32" y="32" width="448" height="448" rx="86" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.55"/>

  <!-- ========== Ogee (onion) arch · oriental moorish frame ========== -->
  <!-- Composed: small bulb / cusps / pointed top / drops to base on each side -->
  <g stroke="url(#goldBright)" stroke-width="3.2" fill="none" stroke-linejoin="round" stroke-linecap="round" filter="url(#goldGlow)">
    <path d="
      M 130 360
      C 130 320, 130 290, 156 270
      C 168 262, 180 268, 188 280
      C 196 268, 200 250, 200 230
      C 200 200, 210 178, 230 162
      C 246 150, 256 138, 256 118
      C 256 138, 266 150, 282 162
      C 302 178, 312 200, 312 230
      C 312 250, 316 268, 324 280
      C 332 268, 344 262, 356 270
      C 382 290, 382 320, 382 360
      L 130 360 Z
    "/>
  </g>

  <!-- Small perfume bottle stopper on top of the arch (orb + tiny ring) -->
  <g fill="url(#goldBright)" stroke="url(#gold)" stroke-width="1">
    <circle cx="256" cy="108" r="5.2"/>
    <rect x="252.5" y="113" width="7" height="6" rx="1.2"/>
    <ellipse cx="256" cy="124" rx="9" ry="4.5"/>
    <rect x="247" y="124" width="18" height="4" rx="1"/>
  </g>

  <!-- ========== Monogram F inside the arch ========== -->
  <!-- Main F · classy serif, slightly italic feel -->
  <g>
    <text x="256" y="320"
          text-anchor="middle"
          font-family="Cormorant Garamond, Garamond, Georgia, serif"
          font-weight="600"
          font-size="200"
          fill="url(#goldBright)"
          filter="url(#goldGlow)">F</text>
  </g>

  <!-- Ornamental flourish hanging from the F's lower-left stem -->
  <g fill="none" stroke="url(#goldBright)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#goldGlow)">
    <!-- Main curling tendril emerging from the F's stem -->
    <path d="
      M 222 248
      C 206 256, 192 270, 188 290
      C 184 308, 196 326, 216 326
      C 230 326, 240 314, 236 302
      C 232 292, 220 290, 214 298
    "/>
    <!-- Secondary curl falling below -->
    <path d="
      M 218 320
      C 208 332, 206 348, 218 354
      C 230 358, 240 348, 238 336
    "/>
    <!-- Tiny leaf accent -->
    <path d="
      M 204 282
      C 200 276, 200 270, 206 268
      C 212 270, 214 276, 210 282
      Z
    " fill="url(#goldBright)" stroke="url(#gold)" stroke-width="0.7"/>
    <!-- Tip droplets -->
  </g>
  <g fill="url(#goldBright)">
    <circle cx="218" cy="354" r="2.2"/>
    <circle cx="238" cy="336" r="1.6"/>
    <circle cx="214" cy="298" r="1.4"/>
  </g>

  <!-- ========== Wordmark ========== -->
  <g>
    <text x="256" y="408"
          text-anchor="middle"
          font-family="Cormorant Garamond, Garamond, Georgia, serif"
          font-weight="500"
          font-size="56"
          fill="url(#goldBright)"
          letter-spacing="8">FERNANDA</text>
  </g>

  <!-- Decorative divider · line — diamond — line -->
  <g stroke="url(#gold)" stroke-width="1.3" fill="url(#goldBright)">
    <line x1="148" y1="432" x2="234" y2="432"/>
    <line x1="278" y1="432" x2="364" y2="432"/>
    <!-- Diamond -->
    <path d="M256 423 L264 432 L256 441 L248 432 Z"/>
  </g>

  <!-- Subtitle -->
  <g>
    <rect x="116" y="448" width="280" height="28" rx="6" fill="none" stroke="url(#gold)" stroke-width="0.6" opacity="0.4"/>
    <text x="256" y="468"
          text-anchor="middle"
          font-family="Cormorant Garamond, Garamond, Georgia, serif"
          font-weight="500"
          font-size="20"
          fill="url(#goldBright)"
          letter-spacing="10">PERFUMES ÁRABES</text>
  </g>

  <!-- Sparkles · light reflections on the gold -->
  <use href="#sparkle" x="190" y="178" width="14" height="14"/>
  <use href="#sparkle" x="324" y="162" width="10" height="10"/>
  <use href="#sparkle" x="282" y="248" width="9"  height="9"/>
  <use href="#sparkle" x="356" y="260" width="7"  height="7"/>
  <use href="#sparkle" x="146" y="288" width="7"  height="7"/>
</svg>
